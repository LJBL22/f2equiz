name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Project Setup
        run: |
          npm install
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          allowed_tools: "Bash(npm:*),Bash(git:*),mcp__playwright__browser_snapshot,mcp__playwright__browser_click,mcp__playwright__browser_navigate,mcp__playwright__browser_type,mcp__playwright__browser_take_screenshot"

          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": [
                    "@playwright/mcp@0.0.68",
                    "--allowed-origins",
                    "localhost:3000"
                  ]
                }
              }
            }

          custom_instructions: |
            This is a Frontend Mentor quiz app built with React, Redux Toolkit, React Router v6, and Tailwind CSS.

            The dev server is running at http://localhost:3000.
            Use mcp__playwright tools to open a browser and interact with the app when needed to verify UI behavior.

            ## Available commands
            - `npm run lint`  — ESLint, zero warnings allowed (--max-warnings 0). Always run after making code changes.
            - `npm run build` — Production build. Run to verify the build succeeds.

            ## Architecture
            - User flow: Menu (/) → Quiz (/:topic) → Result (/result), wrapped in Layout
            - State: two Redux slices — menuSlice (theme, quiz list) and quizSlice (questions, score)
            - Theme: driven by data-theme on <html>, synced with localStorage and Redux via Switch.tsx
            - API: quiz data fetched from /api/quizzes (proxied to https://f2equiz-json.vercel.app in dev)

            ## Tailwind custom breakpoints
            tablet → 520px, laptop → 768px, desktop → 1024px, screen → 1440px

            ## Conventions
            - No test suite — validate with lint and build instead
            - Use double quotes in TSX/TS files
